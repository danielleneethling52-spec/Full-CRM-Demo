<!DOCTYPE html>
<html>
<head>
<title>CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10">

<h1 class="text-2xl mb-4">Bookings CRM</h1>

<table class="w-full border">
<thead>
<tr>
<th>Name</th>
<th>Property</th>
<th>Dates</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center">
<div class="bg-white p-6 w-[400px]">
<div id="modalContent"></div>
<button onclick="closeModal()" class="mt-4">Close</button>
</div>
</div>

<script>

function getBookings(){
return JSON.parse(localStorage.getItem("rilukey_bookings")) || [];
}

let current;

function render(){
let bookings = getBookings();

table.innerHTML = bookings.map(b=>`
<tr class="border">
<td>${b.name}</td>
<td>${b.property}</td>
<td>${b.startDate} → ${b.endDate}</td>
<td>R${b.amount}</td>
<td><button onclick="openBooking(${b.id})">View</button></td>
</tr>
`).join('');
}

function openBooking(id){
current = id;
let b = getBookings().find(x=>x.id===id);

modal.classList.remove("hidden");
modal.classList.add("flex");

modalContent.innerHTML = `
<h2 class="text-xl">${b.name}</h2>
<p>${b.property}</p>
<p>${b.startDate} → ${b.endDate}</p>

<p>Total: R${b.amount}</p>

<p class="mt-2"><b>Cancellation:</b> ${b.cancellation}</p>
<p><b>Policy:</b> ${b.policy}</p>

<button onclick="updateStage('Confirmed')" class="bg-green-500 px-2 mt-2">Confirm</button>
<button onclick="updateStage('Paid')" class="bg-blue-500 px-2 mt-2">Mark Paid</button>
`;
}

function updateStage(stage){
let bookings = getBookings();

bookings = bookings.map(b =>
b.id === current ? {...b, stage} : b
);

localStorage.setItem("rilukey_bookings", JSON.stringify(bookings));

render();
alert("Updated");
}

function closeModal(){
modal.classList.add("hidden");
}

render();

</script>

</body>
</html>
