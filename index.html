<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rilukey Group | Curated Stays</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');

body { font-family:'Plus Jakarta Sans'; background:#0a0a0c; color:white; }
h1,h2,h3 { font-family:'Syncopate'; }

.glass-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(20px);}
.btn { background:#0d9488; padding:12px 20px; border-radius:10px; font-weight:bold;}
.btn:hover { background:#2dd4bf; color:black;}
.room { border:1px solid rgba(255,255,255,0.1); padding:10px; cursor:pointer;}
.room.selected { border-color:#2dd4bf; background:rgba(45,212,191,0.1);}
</style>
</head>

<body>

<div class="p-10 text-center">
<h1 class="text-4xl mb-6">Curated Stays</h1>

<div class="glass-card p-6 rounded-xl">
<input type="date" id="checkin">
<input type="date" id="checkout">
<button onclick="search()" class="btn">Search</button>
</div>
</div>

<div id="listings" class="p-10 grid grid-cols-2 gap-6"></div>

<div id="modal" class="fixed inset-0 hidden bg-black/90 flex items-center justify-center">
<div class="bg-black p-6 rounded-xl w-[500px]">

<h2 id="title"></h2>

<div id="rooms"></div>

<input id="name" placeholder="Name" class="w-full p-2 mt-2 text-black">
<input id="email" placeholder="Email" class="w-full p-2 mt-2 text-black">

<select id="payment" class="w-full p-2 mt-2 text-black"></select>

<button onclick="book()" class="btn w-full mt-4">Continue</button>

</div>
</div>

<script>

let data = [
{
id:1,
name:"Horizon One",
price:8500,
policy:"Free cancellation 14 days before check-in"
}
];

let selected = null;

function search(){
render(data);
}

function render(items){
listings.innerHTML = items.map(p=>`
<div class="glass-card p-6">
<h2>${p.name}</h2>
<p>R${p.price}</p>
<button onclick="openModal(${p.id})" class="btn mt-4">Book</button>
</div>
`).join('');
}

function openModal(id){
selected = data.find(x=>x.id===id);
modal.classList.remove('hidden');

rooms.innerHTML = `<div onclick="selectRoom()" class="room">Full Unit - R${selected.price}</div>`;
updatePaymentOptions();
}

function selectRoom(){
document.querySelector('.room').classList.add('selected');
}

function updatePaymentOptions(){
let cin = new Date(checkin.value);
let now = new Date();
let days = (cin - now) / (1000*60*60*24);

payment.innerHTML = "";

if(days > 30){
payment.innerHTML = `
<option value="0">Enquiry</option>
<option value="0.5">Deposit</option>
<option value="1">Full Payment</option>`;
}else{
payment.innerHTML = `
<option value="0">Enquiry</option>
<option value="1">Full Payment</option>`;
}
}

function book(){

let booking = {
id: Date.now(),
name: name.value,
email: email.value,
property: selected.name,
start: checkin.value,
end: checkout.value,
payment: payment.value,
amount: selected.price,
policy: selected.policy,
stage: payment.value == 0 ? "Pending" : "Confirmed"
};

let all = JSON.parse(localStorage.getItem("bookings") || "[]");
all.push(booking);
localStorage.setItem("bookings", JSON.stringify(all));

alert("Booking Submitted!");
modal.classList.add("hidden");
}

</script>

</body>
</html>
